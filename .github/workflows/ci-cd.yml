name: CI/CD Pipeline
on:
  push:
    branches:
      - main
jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Export Image
        run: |
          IMAGE_NAME=$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')/node-app-secure:latest
          docker build -t $IMAGE_NAME ./app-secure
          # On crée le tarball
          docker save $IMAGE_NAME > image.tar
          echo "FULL_IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan Image Tarball
        run: |
          # COMMANDE CRITIQUE : On utilise --input UNIQUEMENT
          trivy image --exit-code 1 --severity HIGH,CRITICAL --input image.tar

      - name: Push to Docker Hub
        if: success()
        run: |
          docker push ${{ env.FULL_IMAGE_NAME }}
