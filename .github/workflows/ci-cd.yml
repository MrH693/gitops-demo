name: CI/CD Pipeline
on:
  push:
    branches:
      - main
jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          # On force le nom en minuscules pour éviter les bugs Docker
          IMAGE_NAME=$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')/node-app-secure:latest
          docker build -t $IMAGE_NAME ./app-secure
          # On sauvegarde le nom pour les étapes suivantes
          echo "FULL_IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FULL_IMAGE_NAME }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push to Docker Hub
        if: success()
        run: |
          docker push ${{ env.FULL_IMAGE_NAME }}
