name: CI/CD Pipeline
on:
  push:
    branches:
      - main
jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image and export to tar
        run: |
          IMAGE_NAME=$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')/node-app-secure:latest
          docker build -t $IMAGE_NAME ./app-secure
          # On exporte l'image dans un fichier pour Trivy
          docker save -o node-app-secure.tar $IMAGE_NAME
          echo "FULL_IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Scan tarball with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          input: node-app-secure.tar # On scanne le fichier directement
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Push to Docker Hub
        if: success()
        run: |
          docker push ${{ env.FULL_IMAGE_NAME }}
