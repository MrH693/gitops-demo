apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app-secure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-app-secure
  template:
    metadata:
      labels:
        app: node-app-secure
    spec:
      containers:
      - name: node-app-secure
        image: mrh693/node-app-secure:latest
        ports:
        - containerPort: 3000
