cat << 'EOF' > manifests/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app-secure
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-app-secure
  template:
    metadata:
      labels:
        app: node-app-secure
    spec:
      containers:
      - name: node-app-secure
        # REMPLACE "ton-utilisateur-docker" par ton vrai pseudo Docker Hub après !
        image: DOCKERHUB_USERNAME/node-app-secure:latest
        ports:
        - containerPort: 3000
EOF
